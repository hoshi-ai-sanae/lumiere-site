<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セラピストさんへ 星からの働き方メッセージ ✦ 坂井佐奈</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{--night:#05071a;--star1:#fffde0;--star2:#c8d8ff;--soft:#e8e0ff;}
html,body{background:var(--night);min-height:100vh;font-family:'Noto Serif JP',serif;overflow-x:hidden;}
body{display:flex;flex-direction:column;align-items:center;}
#sky{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:var(--min);}to{opacity:1;transform:scale(1.5);}}
.meteor{position:absolute;width:2px;height:80px;background:linear-gradient(to bottom,rgba(255,255,240,0),rgba(255,255,240,.85));border-radius:2px;animation:shoot var(--md) linear infinite;opacity:0;}
@keyframes shoot{0%{opacity:0;transform:translateY(-80px) rotate(15deg);}10%{opacity:1;}40%{opacity:0;}100%{opacity:0;transform:translateY(600px) translateX(200px) rotate(15deg);}}
#app{position:relative;z-index:1;width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2.5rem 1.5rem 4rem;}

.title-area{text-align:center;margin-bottom:1.8rem;animation:floatIn 1.2s ease both;}
.title-sub{font-size:11px;letter-spacing:.3em;color:var(--star2);opacity:.7;margin-bottom:.5rem;font-family:'Shippori Mincho',serif;}
.title-main{font-size:20px;font-weight:300;color:var(--star1);letter-spacing:.12em;line-height:1.9;font-family:'Shippori Mincho',serif;}
.title-month{font-size:12px;color:var(--star2);letter-spacing:.25em;margin-top:.5rem;opacity:.75;font-family:'Shippori Mincho',serif;}
@keyframes floatIn{from{opacity:0;transform:translateY(-18px);}to{opacity:1;transform:translateY(0);}}

#hoshi-stage{position:relative;width:170px;height:170px;margin-bottom:1.4rem;animation:floatUp 3.5s ease-in-out infinite alternate;}
@keyframes floatUp{from{transform:translateY(0);}to{transform:translateY(-12px);}}
.glow-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:pulseRing 3s ease-in-out infinite;pointer-events:none;}
.glow-ring:nth-child(1){width:115px;height:115px;border:1px solid rgba(200,216,255,.2);}
.glow-ring:nth-child(2){width:150px;height:150px;border:1px solid rgba(200,216,255,.11);animation-delay:.7s;}
.glow-ring:nth-child(3){width:182px;height:182px;border:1px solid rgba(200,216,255,.05);animation-delay:1.4s;}
@keyframes pulseRing{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.06);}}

#open-btn{background:transparent;border:1px solid rgba(200,216,255,.4);color:var(--soft);font-family:'Shippori Mincho',serif;font-size:15px;letter-spacing:.2em;padding:12px 2.2rem;border-radius:40px;cursor:pointer;transition:all .3s;margin-bottom:2rem;}
#open-btn:hover{border-color:rgba(200,216,255,.8);color:#fff;}
#open-btn:active{transform:scale(.97);}

#msg-wrap{width:100%;display:none;animation:cardReveal .8s cubic-bezier(.16,1,.3,1) both;}
@keyframes cardReveal{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}

.card{width:100%;background:rgba(20,24,80,.6);border:1px solid rgba(200,216,255,.2);border-radius:20px;padding:1.8rem 1.6rem;backdrop-filter:blur(8px);margin-bottom:1rem;}
.card-label{font-size:11px;letter-spacing:.3em;color:var(--star2);opacity:.7;margin-bottom:.8rem;font-family:'Shippori Mincho',serif;}
.card-body{font-size:15px;line-height:2.2;color:var(--star1);letter-spacing:.06em;font-family:'Shippori Mincho',serif;white-space:pre-line;}
.card-body.attention{color:#ffb8b8;}
.card-body.arrange{color:#b8ffcc;}

.divider{width:36px;height:1px;background:rgba(200,216,255,.25);margin:1rem auto;}

.signs-card{width:100%;background:rgba(20,24,80,.6);border:1px solid rgba(200,216,255,.2);border-radius:20px;padding:1.8rem 1.6rem;backdrop-filter:blur(8px);margin-bottom:1rem;}
.signs-label{font-size:11px;letter-spacing:.3em;color:var(--star2);opacity:.7;margin-bottom:1.2rem;font-family:'Shippori Mincho',serif;text-align:center;}
.sign-row{display:flex;align-items:flex-start;gap:.7rem;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid rgba(200,216,255,.1);}
.sign-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.sign-icon{font-size:18px;line-height:1;min-width:28px;text-align:center;padding-top:.2rem;}
.sign-text{flex:1;}
.sign-name{font-size:11px;letter-spacing:.15em;margin-bottom:.3rem;font-family:'Shippori Mincho',serif;opacity:.8;}
.sign-msg{font-size:14px;line-height:1.9;color:var(--star1);letter-spacing:.05em;font-family:'Shippori Mincho',serif;}

.word-card{width:100%;background:rgba(20,24,80,.4);border:1px solid rgba(200,216,255,.15);border-radius:20px;padding:1.5rem 1.6rem;backdrop-filter:blur(8px);margin-bottom:1rem;text-align:center;}
.word-text{font-size:15px;color:var(--star2);line-height:2;letter-spacing:.12em;font-family:'Shippori Mincho',serif;font-style:italic;}
.footer-text{font-size:12px;color:var(--star2);opacity:.6;line-height:2;letter-spacing:.1em;font-family:'Shippori Mincho',serif;margin-top:.8rem;}
.credit{font-size:10px;color:var(--star2);opacity:.3;margin-top:.8rem;letter-spacing:.2em;font-family:'Shippori Mincho',serif;}

#back-btn{margin-top:.5rem;display:block;width:100%;text-align:center;background:transparent;border:none;color:rgba(200,216,255,.4);font-size:12px;letter-spacing:.2em;cursor:pointer;font-family:'Shippori Mincho',serif;transition:color .2s;text-decoration:underline;text-underline-offset:4px;}
#back-btn:hover{color:rgba(200,216,255,.8);}

#sign-section{width:100%;margin-bottom:1rem;}
.sign-section-label{font-size:11px;letter-spacing:.3em;color:var(--star2);opacity:.7;margin-bottom:.9rem;font-family:'Shippori Mincho',serif;text-align:center;}
#sign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:100%;margin-bottom:.8rem;}
.sign-btn{background:rgba(20,24,80,.5);border:1px solid rgba(200,216,255,.18);border-radius:10px;padding:7px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .2s;}
.sign-btn:hover{background:rgba(40,50,120,.7);border-color:rgba(200,216,255,.5);}
.sign-btn.selected{background:rgba(60,40,120,.7);border-color:rgba(220,180,255,.7);}
.sign-sym{font-size:17px;line-height:1;color:var(--star1);}
.sign-name-btn{font-size:10px;color:var(--star2);letter-spacing:.03em;font-family:'Shippori Mincho',serif;}

#sign-result{width:100%;background:rgba(40,20,100,.65);border:1px solid rgba(220,180,255,.35);border-radius:20px;padding:1.6rem;backdrop-filter:blur(8px);margin-bottom:1rem;display:none;animation:cardReveal .6s cubic-bezier(.16,1,.3,1) both;}
.sign-result-header{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem;}
.sign-result-sym{font-size:26px;line-height:1;}
.sign-result-name{font-size:13px;letter-spacing:.2em;font-family:'Shippori Mincho',serif;}
.sign-result-body{font-size:15px;line-height:2.1;color:var(--star1);letter-spacing:.06em;font-family:'Shippori Mincho',serif;}

.sparkle{position:fixed;border-radius:50%;animation:sparkleOut var(--st) ease-out forwards;pointer-events:none;z-index:999;}
@keyframes sparkleOut{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0);}}
</style>
</head>
<body>
<div id="sky"></div>
<div id="app">
  <div class="title-area">
    <div class="title-sub">✦ 星×AIナビゲーター　坂井佐奈 ✦</div>
    <div class="title-main">忙しいセラピストさんへ<br>星からの働き方メッセージ</div>
    <div class="title-month" id="title-month"></div>
  </div>

  <div id="hoshi-stage">
    <div class="glow-ring"></div><div class="glow-ring"></div><div class="glow-ring"></div>
    <svg width="170" height="170" viewBox="0 0 170 170">
      <polygon points="85,18 92,62 136,62 101,88 114,132 85,106 56,132 69,88 34,62 78,62" fill="#f0d080" opacity=".9">
        <animate attributeName="opacity" values=".9;1;.7;1;.9" dur="2.8s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="rotate" values="0 85 85;3 85 85;-3 85 85;0 85 85" dur="4s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="85,18 92,62 136,62 101,88 114,132 85,106 56,132 69,88 34,62 78,62" fill="#fff8c0" opacity=".4">
        <animate attributeName="opacity" values=".4;.8;.2;.6;.4" dur="1.8s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="85" cy="85" r="36" fill="none" stroke="#f0d080" stroke-width=".5" opacity=".3">
        <animate attributeName="r" values="36;42;36" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".3;.6;.3" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="85" cy="85" r="52" fill="none" stroke="#c8d8ff" stroke-width=".5" opacity=".2">
        <animate attributeName="r" values="52;58;52" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".2;.4;.2" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="42" cy="50" r="2" fill="#c8d8ff" opacity=".6"><animate attributeName="opacity" values=".6;1;.3;.8;.6" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="130" cy="45" r="1.5" fill="#ffc8e8" opacity=".5"><animate attributeName="opacity" values=".5;1;.2;.7;.5" dur="1.7s" repeatCount="indefinite"/></circle>
      <circle cx="38" cy="118" r="1.5" fill="#fffde0" opacity=".5"><animate attributeName="opacity" values=".5;.2;1;.4;.5" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="135" cy="115" r="2" fill="#c8d8ff" opacity=".4"><animate attributeName="opacity" values=".4;.8;.3;1;.4" dur="1.9s" repeatCount="indefinite"/></circle>
      <circle cx="70" cy="30" r="1.2" fill="#fffde0" opacity=".4"><animate attributeName="opacity" values=".4;1;.3;.7;.4" dur="3.1s" repeatCount="indefinite"/></circle>
      <circle cx="110" cy="140" r="1.2" fill="#ffc8e8" opacity=".4"><animate attributeName="opacity" values=".4;.8;.2;.9;.4" dur="2.3s" repeatCount="indefinite"/></circle>
    </svg>
  </div>

  <button id="open-btn">✦ 今月のメッセージを受け取る</button>

  <div id="msg-wrap">
    <div class="card">
      <div class="card-label">✦ 今月の全体メッセージ</div>
      <div class="card-body" id="msg-flow"></div>
    </div>
    <div class="card">
      <div class="card-label">⚠ 今月の注意点</div>
      <div class="card-body attention" id="msg-attention"></div>
    </div>
    <div class="card">
      <div class="card-label">✿ 今月の整えポイント</div>
      <div class="card-body arrange" id="msg-arrange"></div>
    </div>

    <div class="signs-card" id="sign-section">
      <div class="signs-label">✦ あなたの星座を選ぶと、補足メッセージが届きます ✦</div>
      <div id="sign-grid"></div>
    </div>

    <div id="sign-result">
      <div class="sign-result-header">
        <div class="sign-result-sym" id="result-sym"></div>
        <div class="sign-result-name" id="result-name"></div>
      </div>
      <div class="sign-result-body" id="result-msg"></div>
    </div>

    <div class="word-card">
      <div class="word-text" id="msg-word"></div>
      <div class="footer-text" id="msg-footer"></div>
      <div class="credit" id="msg-credit"></div>
    </div>

    <button id="back-btn">↑ 上に戻る</button>
  </div>
</div>

<script>
const monthNames=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
const now=new Date();
const m=now.getMonth();
document.getElementById('title-month').textContent=now.getFullYear()+'年 '+monthNames[m];

      {sym:"♍",name:"乙女座",color:"#b8e8c0",msg:"整えたくなる気持ちが強まる月。整えるのは一箇所だけにして、あとは動いてください。"},

  // 1: 2月
  {
    flow:"今月も忙しいセラピストさんへ、星からのメッセージをお届けしますね。\n\n2月は内側を見つめ直す時期です。表に出て動くより、今の自分と仕事を静かに確認することが大切な月かもしれません。\n\n無理に動こうとせず、今月は「続けていいこと」と「手放していいこと」を整理してみてください。",

    flow:"今月も忙しいセラピストさんへ、星からのメッセージをお届けしますね。\n\n3月は「動き出す」エネルギーが高まりやすい時期です。でもその分、頑張りすぎ・詰め込みすぎになりやすい月でもあります。\n\nお客様対応、発信、事務作業、全部をひとりで抱え込みすぎていないか、見直してみてくださいね。整えながら動く、を意識してみてください。",

      {sym:"♉",name:"牡牛座",color:"#a8d8a0",msg:"丁寧に動けるぶん、時間をかけすぎやすい月。セッション時間のルールを決めてみて。"},

      {sym:"♋",name:"蟹座",color:"#c0d8ff",msg:"感情をもらいすぎ注意。セッション後の切り替え時間を意識的に作ってください。"},

      {sym:"♎",name:"天秤座",color:"#e8c8ff",msg:"断れない場面が増えやすい月。自分が無理なく動ける条件を先に決めてしまいましょう。"},

const grid=document.getElementById('sign-grid');
data.signs.forEach(s=>{
  const btn=document.createElement('button');
  btn.className='sign-btn';
  btn.innerHTML=`<span class="sign-sym" style="color:${s.color}">${s.sym}</span><span class="sign-name-btn">${s.name}</span>`;
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.sign-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('result-sym').textContent=s.sym;
    document.getElementById('result-sym').style.color=s.color;
    document.getElementById('result-name').textContent=s.name+'さんへの補足';
    document.getElementById('result-name').style.color=s.color;
    document.getElementById('result-msg').textContent=s.msg;
    const r=document.getElementById('sign-result');
    r.style.display='block';
    setTimeout(()=>r.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
  });
  grid.appendChild(btn);
});

function spawnSparkles(){
  const stage=document.getElementById('hoshi-stage');
  const rect=stage.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  const cols=['#fffde0','#c8d8ff','#ffc8e8','#f0d080','#e8d0ff'];
  for(let i=0;i<22;i++){
    const sp=document.createElement('div');sp.className='sparkle';
    const a=Math.random()*Math.PI*2,dist=40+Math.random()*90,size=2+Math.random()*4;
    sp.style.cssText=`width:${size}px;height:${size}px;background:${cols[i%cols.length]};left:${cx-size/2}px;top:${cy-size/2}px;--sx:${Math.cos(a)*dist}px;--sy:${Math.sin(a)*dist}px;--st:${.5+Math.random()*.9}s;`;
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),1600);
  }
}

document.getElementById('open-btn').addEventListener('click',()=>{
  spawnSparkles();
  setTimeout(()=>{
    document.getElementById('open-btn').style.display='none';
    document.getElementById('msg-wrap').style.display='block';
  },400);
});

document.getElementById('back-btn').addEventListener('click',()=>{
  document.getElementById('msg-wrap').style.display='none';
  document.getElementById('open-btn').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});

const sky=document.getElementById('sky');

  sky.appendChild(s);
}
